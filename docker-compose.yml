version: '3.9'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: workmanager_db
      POSTGRES_USER: workmanager_user
      POSTGRES_PASSWORD: workmanager123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workmanager_user -d workmanager_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.docker

volumes:
  postgres_data: